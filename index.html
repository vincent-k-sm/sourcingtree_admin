<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SourcingTree Apps</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <header>
        <h1>SourcingTree Apps</h1>
        <p>macOS / iOS 앱 다운로드</p>
    </header>
    <main id="app-list">
        <div class="app-card" id="kpoptube-admin">
            <div class="app-icon">KT</div>
            <div class="app-info">
                <h2>KpopTube Admin</h2>
                <p class="app-desc">KpopTube 관리용 macOS 앱</p>
                <p class="app-version" data-app="kpoptube-admin">버전 확인 중...</p>
                <a class="download-btn" data-app="kpoptube-admin" href="#">다운로드</a>
            </div>
        </div>
        <div class="app-card" id="ad-remover">
            <div class="app-icon">AR</div>
            <div class="app-info">
                <h2>AD Remover</h2>
                <p class="app-desc">광고 차단 macOS 앱</p>
                <p class="app-version" data-app="ad-remover">버전 확인 중...</p>
                <a class="download-btn" data-app="ad-remover" href="#">다운로드</a>
            </div>
        </div>
        <div class="app-card" id="launchbay">n            <div class="app-icon"><img src="assets/icons/launchbay.png" alt="LaunchBay" /></div>n            <div class="app-info">n                <h2>LaunchBay</h2>n                <p class="app-desc">LaunchBay macOS 앱</p>n                <p class="app-version" data-app="launchbay">버전 확인 중...</p>n                <a class="download-btn" data-app="launchbay" href="#">다운로드</a>n            </div>n        </div>
    </main>
    <footer>
        <p>SourcingTree &copy; 2026</p>
    </footer>
    <script src="assets/main.js"></script>
</body>
</html>
